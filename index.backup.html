<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Prompt 构成可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #888;
      font-size: 1.1rem;
    }
    .diagram {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 40px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .flow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      flex-wrap: wrap;
      gap: 10px;
    }
    .flow-step {
      background: rgba(0, 212, 255, 0.1);
      border: 2px solid #00d4ff;
      border-radius: 12px;
      padding: 20px;
      width: 180px;
      text-align: center;
      position: relative;
      z-index: 2;
      transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
    }
    .flow-step:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
    }
    .flow-step.active {
      background: rgba(0, 212, 255, 0.25);
      border-color: #00ffaa;
      box-shadow: 0 0 20px rgba(0, 255, 170, 0.4);
    }
    .flow-step.completed {
      background: rgba(0, 255, 170, 0.2);
      border-color: #00ffaa;
    }
    .flow-step h3 {
      font-size: 1rem;
      margin-bottom: 8px;
      color: #00d4ff;
    }
    .flow-step p {
      font-size: 0.85rem;
      color: #aaa;
    }
    .arrow {
      flex: 1;
      height: 3px;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      min-width: 40px;
      position: relative;
      top: -10px;
    }
    .arrow.animated {
      background: linear-gradient(90deg, #00ffaa, #00d4ff);
      animation: arrowPulse 1s ease-in-out infinite;
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .arrow::after {
      content: '→';
      position: absolute;
      right: -15px;
      top: -12px;
      font-size: 24px;
      color: #7b2ff7;
    }
    .interactive-demo {
      background: rgba(0,0,0,0.3);
      border-radius: 16px;
      padding: 30px;
      margin: 40px 0;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .demo-title {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #00d4ff;
    }
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .input-group input {
      flex: 1;
      min-width: 200px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .input-group input:focus {
      border-color: #00d4ff;
    }
    .input-group button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.3s, transform 0.2s;
    }
    .input-group button:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
    .input-group button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .log-area {
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      max-height: 600px;
      overflow-y: auto;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .log-entry {
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      gap: 8px;
    }
    .log-entry:last-child {
      border-bottom: none;
    }
    .log-time {
      color: #666;
      min-width: 80px;
    }
    .log-phase {
      color: #00d4ff;
      font-weight: bold;
      min-width: 120px;
    }
    .log-detail {
      color: #ccc;
    }
    .log-prompt {
      color: #f1fa8c;
      background: rgba(255,255,255,0.05);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    .log-tool {
      color: #ff79c6;
    }
    .log-result {
      color: #00ffaa;
    }
    .sections {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: border-color 0.3s;
    }
    .card:hover {
      border-color: #7b2ff7;
    }
    .card h2 {
      font-size: 1.3rem;
      margin-bottom: 15px;
      color: #7b2ff7;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card h2 .icon {
      font-size: 1.5rem;
    }
    .card ul {
      list-style: none;
      padding-left: 0;
    }
    .card li {
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: #ccc;
      font-size: 0.95rem;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .card li:last-child {
      border-bottom: none;
    }
    .card li .bullet {
      color: #00d4ff;
      font-weight: bold;
    }
    .detail-view {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 25px;
      margin-top: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
    }
    .detail-view.show {
      display: block;
    }
    .detail-view h3 {
      color: #00d4ff;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }
    .detail-view pre {
      background: rgba(0,0,0,0.5);
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.85rem;
      line-height: 1.5;
      color: #a0ffa0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .code-key { color: #ff79c6; }
    .code-string { color: #f1fa8c; }
    .code-comment { color: #6272a4; }
    .toggle-btn {
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      font-size: 0.9rem;
      transition: opacity 0.3s;
    }
    .toggle-btn:hover {
      opacity: 0.9;
    }
    .legend {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: #aaa;
    }
    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }
    .legend-color.context { background: #00d4ff; }
    .legend-color.tool { background: #7b2ff7; }
    .legend-color.skill { background: #00ffaa; }
    footer {
      text-align: center;
      margin-top: 50px;
      padding: 20px;
      color: #666;
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    footer a {
      color: #00d4ff;
      text-decoration: none;
    }
    .highlight {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(0, 212, 255, 0); }
    }
    .mode-badge {
      display: inline-block;
      background: rgba(123, 47, 247, 0.2);
      color: #b08dff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin-left: 10px;
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      body { padding: 10px; }
      .container { max-width: 100%; }
      h1 { font-size: 1.8rem; }
      .subtitle { font-size: 0.95rem; }
      .legend { gap: 15px; }
      .legend-item { font-size: 0.8rem; }
      .flow { flex-direction: column; gap: 15px; }
      .arrow {
        width: 3px; height: 25px; min-width: 0; align-self: center;
      }
      .arrow::after { content: '↓'; right: -8px; top: -10px; }
      .flow-step {
        width: 100%; max-width: 280px; padding: 15px;
      }
      .flow-step h3 { font-size: 0.9rem; }
      .flow-step p { font-size: 0.8rem; }
      .sections { grid-template-columns: 1fr; }
      .card { padding: 20px; }
      .card h2 { font-size: 1.1rem; }
      .card ul { font-size: 0.9rem; }
      .interactive-demo { padding: 20px; }
      .demo-title { font-size: 1.2rem; }
      .input-group { flex-direction: column; }
      .input-group input { min-width: 100%; }
      .input-group button { width: 100%; }
      .log-area {
        font-size: 0.85rem; padding: 15px; max-height: 400px;
      }
      .log-entry {
        flex-direction: column; gap: 4px; align-items: flex-start;
      }
      .log-time, .log-phase { min-width: auto; font-size: 0.8rem; }
      .log-phase { font-size: 0.9rem; }
      .detail-view { padding: 15px; }
      .detail-view h3 { font-size: 1rem; }
      .detail-view pre { font-size: 0.8rem; padding: 10px; }
      .toggle-btn { width: 100%; padding: 12px; }
      footer { font-size: 0.8rem; padding: 15px; }
    }
    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .flow-step { padding: 12px; }
      .flow-step h3 { font-size: 0.85rem; }
      .flow-step p { font-size: 0.75rem; }
      .card h2 { font-size: 1rem; }
      .card li { font-size: 0.85rem; padding: 6px 0; }
    }


    <script>
      function toggleDetail(id) {
        const el = document.getElementById(id);
        const isVisible = el.classList.contains('show');
        el.classList.toggle('show', !isVisible);
      }

      // 交互：点击流程图步骤高亮关联卡片
      document.querySelectorAll('.flow-step').forEach(step => {
        step.addEventListener('click', function() {
          const stepNum = this.dataset.step;
          document.querySelectorAll('.flow-step').forEach(s => s.classList.remove('active', 'highlight'));
          document.querySelectorAll('.card').forEach(c => c.style.borderColor = '');

          this.classList.add('active', 'highlight');

          const cardMap = {
            '1': 'card-bootstrap',
            '2': 'card-session',
            '3': 'card-bootstrap',
            '4': 'card-system',
            '5': 'card-queue'
          };
          if (cardMap[stepNum]) {
            const card = document.getElementById(cardMap[stepNum]);
            if (card) {
              card.style.borderColor = '#00d4ff';
              card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          }
        });
      });

      // 模拟演示逻辑 - 真实细节
      const phaseDescriptions = [
        {
          name: "Inbound Message",
          detail: (input) => {
            const channel = "webchat";
            const sender = "openclaw-control-ui";
            const deduped = Math.random() > 0.7 ? "(重复消息已去重)" : "";
            return `[${channel}] 收到来自 <${sender}> 的消息: "${input}" ${deduped} → 分配到 sessionKey="agent:main:main"`;
          }
        },
        {
          name: "Session Resolution",
          detail: (input) => {
            const sessionId = "d078daab-b20e-4c98-b3f4-2739163937c1";
            const historyCount = Math.floor(Math.random()*15)+10;
            const hasDevice = true;
            return `解析会话: id=${sessionId} | 设备=${hasDevice ? '已配对' : '未配对'} | 加载最近 ${historyCount} 条历史消息（含 ${Math.floor(historyCount*0.3)} 条工具结果）`;
          }
        },
        {
          name: "Bootstrap Load",
          detail: (input) => {
            const files = [
              "AGENTS.md (8,040 chars)",
              "SOUL.md (1,710 chars)",
              "TOOLS.md (7,054 chars)",
              "USER.md (477 chars)",
              "IDENTITY.md (636 chars)",
              "HEARTBEAT.md (168 chars)",
              "MEMORY.md (如存在)"
            ];
            const total = (35000 + Math.random()*50000).toFixed(0);
            return `加载引导文件并注入到系统提示:\n${files.map(f=>`  - ${f}`).join('\n')}\n总计: ~${total} 字符 / 150,000 最大限制`;
          }
        },
        {
          name: "System Prompt Build",
          detail: (input) => {
            const toolCount = 18 + Math.floor(Math.random()*5);
            const skills = ["dingtalk-docs", "dingtalk-ai-table", "feishu-docs", "summarize"].slice(0, Math.floor(Math.random()*3)+2);
            const contextTokens = (32000 + Math.random()*8000).toFixed(0);
            const availableContext = (128000 - parseFloat(contextTokens)).toFixed(0);
            return `promptMode=full | 组装系统提示:\n  • Tooling: ${toolCount} 个工具 (read, exec, browser, process, ...)\n  • Skills: ${skills.length} 个技能元数据 (按需加载)\n  • Safety: 已注入护栏提醒\n  • Runtime: host=racknerd-c83d2ec | model=${getRandomModel()}\n  • Bootstrap: 已截断/合并\n  • Context: ~${contextTokens} tok 已使用 | 剩余 ${availableContext} tok`;
          }
        },
        {
          name: "Model Call",
          detail: (input) => {
            const model = getRandomModel();
            return `发送完整提示到模型: ${model}\n  配置: temperature=0.7 | max_tokens=4096 | block streaming enabled\n  等待流式响应...`;
          }
        }
      ];

      function getRandomModel() {
        const models = [
          "openrouter/stepfun/step-3.5-flash:free",
          "openrouter/anthropic/claude-sonnet-4-5",
          "openrouter/openai/gpt-4o",
          "ollama/llama3.1:8b"
        ];
        return models[Math.floor(Math.random() * models.length)];
      }

      async function runDemo() {
        const input = document.getElementById('userInput').value.trim();
        const btn = document.getElementById('submitBtn');
        const logArea = document.getElementById('logArea');

        if (!input) {
          alert('请输入消息');
          return;
        }

        btn.disabled = true;
        btn.textContent = '执行中...';
        logArea.innerHTML = '';

        document.querySelectorAll('.flow-step').forEach(s => s.classList.remove('completed', 'active'));
        document.querySelectorAll('.arrow').forEach(a => a.classList.remove('animated'));

        let delay = 0;
        for (let i = 1; i <= phaseDescriptions.length; i++) {
          setTimeout(() => {
            const stepEl = document.querySelector(`.flow-step[data-step="${i}"]`);
            const prevStep = document.querySelector(`.flow-step[data-step="${i-1}"]`);
            const arrow = document.querySelectorAll('.arrow')[i-1];

            if (prevStep) prevStep.classList.add('completed');
            stepEl.classList.add('active');
            if (arrow) arrow.classList.add('animated');

            const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            const phase = phaseDescriptions[i-1].name;
            const detail = phaseDescriptions[i-1].detail(input);

            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `
              <span class="log-time">[${time}]</span>
              <span class="log-phase">${phase}</span>
              <span class="log-detail">${detail.replace(/\n/g, '<br>')}</span>
            `;
            logArea.appendChild(logEntry);
            logArea.scrollTop = logArea.scrollHeight;

            if (i === phaseDescriptions.length) {
              setTimeout(() => {
                simulateToolCalls(logArea);
              }, 1000);
            }

            if (i === phaseDescriptions.length) {
              setTimeout(() => {
                stepEl.classList.remove('active');
                stepEl.classList.add('completed');
                const finalArrow = document.querySelectorAll('.arrow')[i-1];
                if (finalArrow) finalArrow.classList.add('animated');

                const time2 = new Date().toLocaleTimeString('zh-CN', { hour12: false });
                const finalLog = document.createElement('div');
                finalLog.className = 'log-entry';
                finalLog.innerHTML = `
                  <span class="log-time">[${time2}]</span>
                  <span class="log-phase">Response</span>
                  <span class="log-detail">✅ 处理完成！回复已发送给用户。</span>
                `;
                logArea.appendChild(finalLog);
                logArea.scrollTop = logArea.scrollHeight;

                btn.disabled = false;
                btn.textContent = '开始执行';
              }, 2000);
            }
          }, delay);
          delay += 1500;
        }
      }

      function simulateToolCalls(logArea) {
        const tools = ['read', 'exec', 'session_status', 'memory_search'];
        const toolCount = Math.floor(Math.random() * 3) + 1;
        let tDelay = 0;

        for (let t = 0; t < toolCount; t++) {
          setTimeout(() => {
            const tool = tools[Math.floor(Math.random() * tools.length)];
            const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });

            const toolStart = document.createElement('div');
            toolStart.className = 'log-entry';
            toolStart.innerHTML = `
              <span class="log-time">[${time}]</span>
              <span class="log-phase">Tool Call</span>
              <span class="log-detail"><span class="log-tool">${tool}</span>() 执行中...</span>
            `;
            logArea.appendChild(toolStart);
            logArea.scrollTop = logArea.scrollHeight;

            setTimeout(() => {
              const time2 = new Date().toLocaleTimeString('zh-CN', { hour12: false });
              const result = tool === 'read' ? `文件内容已读取 (${(Math.random()*5000+500).toFixed(0)} 字符)` :
                            tool === 'exec' ? `命令执行完成，退出码 0` :
                            tool === 'session_status' ? `会话状态: 上下文 ${(Math.random()*30+10).toFixed(1)}/32K tok` :
                            `找到 ${Math.floor(Math.random()*5)+1} 条相关记忆`;

              const toolEnd = document.createElement('div');
              toolEnd.className = 'log-entry';
              toolEnd.innerHTML = `
                <span class="log-time">[${time2}]</span>
                <span class="log-phase">Tool Result</span>
                <span class="log-detail"><span class="log-tool">${tool}</span>() → <span class="log-result">${result}</span></span>
              `;
              logArea.appendChild(toolEnd);
              logArea.scrollTop = logArea.scrollHeight;
            }, 1000 + Math.random() * 1500);
          }, tDelay);
          tDelay += 2000;
        }
      }

      document.getElementById('userInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') runDemo();
      });

      window.addEventListener('DOMContentLoaded', () => {
        const firstStep = document.querySelector('.flow-step[data-step="1"]');
        if (firstStep) firstStep.click();
      });
    </script>
