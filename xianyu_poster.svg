<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bgGrad)" />

  <!-- 装饰条纹 -->
  <rect x="0" y="0" width="1200" height="80" fill="#FF4500" opacity="0.3" />
  <rect x="0" y="1120" width="1200" height="80" fill="#FF4500" opacity="0.3" />

  <!-- 龙虾简笔画（简化版） -->
  <g transform="translate(600, 200)" fill="#FFFFFF">
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="120" ry="80" />
    <!-- 头部 -->
    <path d="M-80,-80 L-40,-120 L40,-120 L80,-80 Z" />
    <!-- 眼睛 -->
    <circle cx="-30" cy="-90" r="8" fill="#000" />
    <circle cx="30" cy="-90" r="8" fill="#000" />
    <!-- 触须 -->
    <path d="M-100,-60 Q-130,-100 -150,-80" stroke="#FFF" stroke-width="8" fill="none" />
    <path d="M100,-60 Q130,-100 150,-80" stroke="#FFF" stroke-width="8" fill="none" />
    <!-- 钳子 -->
    <circle cx="-140" cy="-40" r="30" />
    <circle cx="140" cy="-40" r="30" />
    <!-- 腿 -->
    <line x1="-80" y1="40" x2="-120" y2="100" stroke="#FFF" stroke-width="8" />
    <line x1="-40" y1="50" x2="-70" y2="110" stroke="#FFF" stroke-width="8" />
    <line x1="0" y1="55" x2="0" y2="110" stroke="#FFF" stroke-width="8" />
    <line x1="40" y1="50" x2="70" y2="110" stroke="#FFF" stroke-width="8" />
    <line x1="80" y1="40" x2="120" y2="100" stroke="#FFF" stroke-width="8" />
  </g>

  <!-- 爆炸框 -->
  <g transform="translate(600, 450)">
    <path d="M-280,-120 L280,-120 L280,120 L-280,120 Z" fill="none" stroke="#FFD700" stroke-width="8" />
    <text x="0" y="0" font-family="黑体, Arial, sans-serif" font-size="120" font-weight="bold" fill="#FFD700" text-anchor="middle" dominant-baseline="middle">¥5.9</text>
  </g>

  <!-- 标题 -->
  <text x="600" y="700" font-family="黑体, Arial, sans-serif" font-size="90" font-weight="bold" fill="#FFFFFF" text-anchor="middle">最后5个名额！</text>
  
  <!-- 副标题 -->
  <text x="600" y="800" font-family="黑体, Arial, sans-serif" font-size="48" fill="#FFFFFF" text-anchor="middle">7天AI助手体验价</text>
  
  <!-- 原价 -->
  <text x="600" y="870" font-family="Arial, sans-serif" font-size="36" fill="#FFD700" text-anchor="middle" line-through>原价 ¥29.9</text>

  <!-- 徽章 -->
  <g transform="translate(600, 980)">
    <rect x="-250" y="-30" width="80" height="60" rx="10" fill="#FF4500" />
    <text x="-210" y="10" font-family="Arial, sans-serif" font-size="28" fill="#FFF" text-anchor="middle" dominant-baseline="middle">交个朋友</text>
    <rect x="170" y="-30" width="80" height="60" rx="10" fill="#FFD700" />
    <text x="210" y="10" font-family="Arial, sans-serif" font-size="28" fill="#333" text-anchor="middle" dominant-baseline="middle">限量</text>
  </g>

  <!-- 底部功能 -->
  <text x="600" y="1080" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" text-anchor="middle">
    <tspan x="600" dy="0">✍️ 写作 💻 代码 📊 分析 · 24h在线 · 5人共享</tspan>
  </text>

  <!-- 倒计时角标 -->
  <g transform="translate(950, 150) rotate(15)">
    <rect x="-80" y="-30" width="160" height="60" rx="30" fill="#FF0000" />
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="28" fill="#FFF" font-weight="bold" text-anchor="middle" dominant-baseline="middle">抢购中</text>
  </g>
</svg>
